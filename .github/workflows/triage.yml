name: Sentriage Triage

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    if: github.event.action == 'labeled' && github.event.label.name == 'needs-triage'
    runs-on: ubuntu-latest
    container:
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
    timeout-minutes: 60
    env:
      CLAUDE_CODE_USE_VERTEX: "1"
      ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CLOUD_ML_REGION: "us-east5"
      DISABLE_AUTOUPDATER: "1"
      CLAUDE_MODEL: "claude-opus-4-6"
      GOOGLE_APPLICATION_CREDENTIALS: "/tmp/gcp-key.json"
      GITHUB_TOKEN: ${{ github.token }}
      SENTRIAGE_ROOT: ${{ github.workspace }}/sentriage
    steps:
      - name: Install container prerequisites
        run: |
          microdnf install -y --nodocs tar gzip git-core findutils jq
          curl -fsSL https://cli.github.com/packages/rpm/gh-cli.repo > /etc/yum.repos.d/gh-cli.repo
          microdnf install -y --nodocs gh

      - uses: actions/checkout@v4
        with:
          repository: russellb/sentriage
          path: sentriage

      - uses: actions/checkout@v4
        with:
          path: instance

      - name: Setup Claude CI
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          WORKSPACE_DIR: ${{ github.workspace }}
        run: |
          bash sentriage/scripts/setup-claude-ci.sh
          if [ -n "$GCP_CREDENTIALS" ]; then
            echo "$GCP_CREDENTIALS" > /tmp/gcp-key.json
            chmod 644 /tmp/gcp-key.json
          fi
          pip3 install pyyaml

      - name: Fix workspace permissions
        run: |
          chmod -R a+rwX "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/instance"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/sentriage"

      - name: Check duplicates
        id: check-duplicates
        working-directory: instance
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SKILL: check-duplicates
        run: bash ../sentriage/actions/run-skill/run.sh

      - name: Validate and assess severity
        id: validate-and-assess
        if: steps.check-duplicates.outputs.recommendation != 'duplicate'
        working-directory: instance
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SKILL: validate-and-assess
        run: bash ../sentriage/actions/run-skill/run.sh

      - name: Finalize triage
        working-directory: instance
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bash ../sentriage/actions/finalize-triage/finalize.sh
