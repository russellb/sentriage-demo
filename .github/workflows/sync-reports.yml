name: Sentriage Sync Reports

on:
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: russellb/sentriage
          sparse-checkout: scripts
          path: sentriage

      - uses: actions/checkout@v4
        with:
          path: instance

      - name: Install dependencies
        run: |
          python3 -m venv /opt/sentriage-venv
          /opt/sentriage-venv/bin/pip install pyyaml
          echo "/opt/sentriage-venv/bin" >> "$GITHUB_PATH"

      - name: Sync reports
        env:
          GITHUB_TOKEN: ${{ secrets.ADVISORY_TOKEN }}
        working-directory: instance
        run: python3 ../sentriage/scripts/sync-reports.py --config sentriage.yml --initial-label new-report
